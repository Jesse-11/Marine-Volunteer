<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Tidekeepers Collective</title>

    <link rel="stylesheet" href="stylesheets/signup.css">
</head>
<body>

    <div id="app" class="page">

        <div class="sign-up-page">

            <div class="picture">
                <img src="images/login-signup-page/sign-in-img.avif" alt="Sign up Image">
            </div>

            <div class="sign-up">

                <h1>Start <span>volunteering.</span> </h1>

                <div class="sign-up-area">

                    <form action="#" class="sign-up-form">
                        <label for="username">Enter username</label>
                        <input type="text" name="username" id="username" class="form-style" placeholder="Enter your username" required>
                        <label for="fname">Enter email address</label>
                        <input type="text" name="email" id="email" class="form-style" placeholder="Enter your email address " required>
                        <label for="password">Enter password</label>
                        <input type="password" name="password" id="password" class="form-style" placeholder="Enter your password" required>
                        <label for="confirm-password">Confirm password</label>
                        <input type="password" name="confirm-password" id="confirm-password" class="form-style" placeholder="Confirm your password" required>
                        <input type="submit" class="btn" value="Create Account">
                    </form>
                    <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>

                </div>
            </div>


        </div>



    </div>
    <script src="javascripts/signup.js"></script>
    <script src="javascripts/site-effects.js"></script>

</body>
</html>
